function App() {
  const [lang, setLang] = useState(loadLS('il_lang','es'));
  const [dark, setDark] = useState(loadLS('il_dark',false));
  const [screen, setScreen] = useState('home');
  const sessGetterRef = useRef(null); // stores getSessionBlocks from SessionScreen
  const [history, setHistory] = useState(() => loadLS('il4_hist', SAMPLE_HIST));
  const [userPrograms, setUserPrograms] = useState(() => loadLS('il4_uprogs', []));
  const [customComplexes, setCustomComplexes] = useState(() => loadLS('il4_cxcustom', []));
  const [sheetUrl, setSheetUrl] = useState(() => loadLS('il4_sheeturl', ''));
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | ok | error
  const [toast, setToast] = useState(null);
  const [showEnergy, setShowEnergy] = useState(false);
  const [pendingStart, setPendingStart] = useState(null); // {progName, blocks}
  const [sessState, sessDispatch] = React.useReducer(sessionReducer, { active:false, progName:'', energy:null, elapsed:0, blocks:[] });
  const elIvRef = useRef(null);
  const toastTRef = useRef(null);
  // persist
  useEffect(()=>{ saveLS('il4_hist', history); },[history]);
  useEffect(()=>{ saveLS('il4_uprogs', userPrograms); },[userPrograms]);
  useEffect(()=>{ saveLS('il4_cxcustom', customComplexes); },[customComplexes]);
  useEffect(()=>{ saveLS('il4_sheeturl', sheetUrl); },[sheetUrl]);

  // ── Sync helpers ──
  const sheetPost = useCallback(async (action, data) => {
    if (!sheetUrl) return null;
    const r = await fetch(sheetUrl, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action, data}),
    });
    return r.json();
  }, [sheetUrl]);

  const sheetGet = useCallback(async (action) => {
    if (!sheetUrl) return null;
    const r = await fetch(sheetUrl + '?action=' + action);
    return r.json();
  }, [sheetUrl]);

  const syncNow = useCallback(async () => {
    if (!sheetUrl || !navigator.onLine) { showToast(lang==='es'?'SIN CONEXIÓN':'NO CONNECTION'); return; }
    setSyncStatus('syncing');
    try {
      // Pull sessions from sheet and merge (sheet is source of truth for past sessions)
      const res = await sheetGet('getSessions');
      if (res?.ok && res.sessions?.length) {
        setHistory(local => {
          const remoteIds = new Set(res.sessions.map(s=>s.id));
          const localOnly = local.filter(s => !remoteIds.has(s.id));
          return [...res.sessions, ...localOnly].sort((a,b)=>b.date.localeCompare(a.date));
        });
      }
      // Push local programs and complexes
      const pRes = await sheetGet('getPrograms');
      if (pRes?.ok) {
        const remoteProgIds = new Set((pRes.programs||[]).map(p=>p.id));
        for (const p of userPrograms) {
          if (!remoteProgIds.has(p.id)) await sheetPost('addProgram', p);
        }
      }
      setSyncStatus('ok');
      showToast(lang==='es'?'SINCRONIZADO ✓':'SYNCED ✓');
      setTimeout(()=>setSyncStatus('idle'), 3000);
    } catch(e) {
      setSyncStatus('error');
      showToast(lang==='es'?'ERROR DE SYNC':'SYNC ERROR');
      setTimeout(()=>setSyncStatus('idle'), 3000);
    }
  }, [sheetUrl, sheetGet, sheetPost, userPrograms, lang, showToast]);
  useEffect(()=>{ saveLS('il_lang', lang); },[lang]);
  useEffect(()=>{ saveLS('il_dark', dark); },[dark]);
  // theme
  useEffect(()=>{
    if(dark) document.documentElement.setAttribute('data-dark','');
    else document.documentElement.removeAttribute('data-dark');
  },[dark]);
  // elapsed timer
  useEffect(()=>{
    if(sessState.active){
      elIvRef.current=setInterval(()=>sessDispatch({type:'TICK'}),1000);
    } else {
      clearInterval(elIvRef.current);
    }
    return ()=>clearInterval(elIvRef.current);
  },[sessState.active]);
  const showToast = useCallback((msg, dur=2200)=>{
    setToast(msg);
    clearTimeout(toastTRef.current);
    toastTRef.current=setTimeout(()=>setToast(null),dur);
  },[]);
  // start flow
  const triggerStart = useCallback((progName, blocks)=>{
    setPendingStart({progName,blocks});
    setShowEnergy(true);
  },[]);
  const onEnergySelect = useCallback((energy)=>{
    setShowEnergy(false);
    if(!pendingStart) return;
    sessDispatch({ type:'START', progName:pendingStart.progName, energy, blocks:pendingStart.blocks||[] });
    setPendingStart(null);
    setScreen('session');
    showToast(lang==='es'?'SESIÓN INICIADA':'SESSION STARTED');
    if(energy==='tired') setTimeout(()=>showToast(lang==='es'?'😴 Sesión corta — 20 min, 1 KB':'😴 Short session recommended',3500),500);
    if(energy==='fire') setTimeout(()=>showToast(lang==='es'?'🔥 A darlo todo hoy':'🔥 Give it everything today'),2000);
  },[pendingStart, lang, showToast]);
  const handleHomeAction = useCallback(a=>{
    if(a==='free') triggerStart(lang==='es'?'SESIÓN LIBRE':'FREE SESSION',[]);
    else if(a==='program'||a==='programs') setScreen('programs');
    else if(a==='library') setScreen('library');
  },[triggerStart,lang]);
  const handleStartProg = useCallback(p=>{
    const blocks = (p.blocks||[]).map(b => {
      if(b.type==='complex'&&b.complexId){
        const cx=cxById(b.complexId,customComplexes);
        if(cx) return { ...b, id:uid(), steps:cx.steps.map(s=>({exId:s.exId,reps:typeof s.reps==='string'?parseInt(s.reps)||1:(s.reps||1)})), exIds:cx.steps.map(s=>s.exId), cfg:{rounds:cx.rounds,rest:cx.rest} };
      }
      return { ...b, id:uid() };
    });
    triggerStart(lang==='es'?p.es:p.en, blocks);
  },[triggerStart,lang,customComplexes]);
  const handleStartCx = useCallback(cx=>{
    const blocks = [{ id:uid(), type:'complex', name:lang==='es'?cx.es:cx.en, cfg:{rounds:cx.rounds,rest:cx.rest}, steps:cx.steps.map(s=>({exId:s.exId,reps:typeof s.reps==='string'?parseInt(s.reps)||1:(s.reps||1)})), exIds:cx.steps.map(s=>s.exId) }];
    triggerStart(lang==='es'?cx.es:cx.en, blocks);
  },[triggerStart,lang]);
  const handleAddToSession = useCallback(exId=>{
    sessDispatch({ type:'ADD_BLOCK', block:{ id:uid(), type:'free', name:exName(exById(exId),lang)||'Ejercicio', cfg:{}, exIds:[exId] }});
    showToast(lang==='es'?'EJERCICIO AGREGADO':'EXERCISE ADDED');
  },[lang,showToast]);
  // end session — harvest sets from DOM via React state inside SessionBlock components
  // We use a ref to collect data
  const handleEndSession = useCallback((note)=>{
    const realBlocks = sessGetterRef.current ? sessGetterRef.current() : sessState.blocks.map(b => ({ type:b.type, name:b.name, exercises:[] }));
    const entry = {
      id:'h'+Date.now(), date:new Date().toISOString().split('T')[0],
      program:sessState.progName, duration:Math.max(1,Math.round(sessState.elapsed/60)),
      energy:sessState.energy||'good', notes:note,
      blocks: realBlocks,
    };
    setHistory(h=>[entry,...h]);
    sessDispatch({type:'END_SESSION'});
    showToast(lang==='es'?'SESIÓN GUARDADA':'SESSION SAVED');
    setScreen('history');
    // Auto-sync to sheet if configured
    if (sheetUrl && navigator.onLine) {
      setTimeout(() => {
        fetch(sheetUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'addSession', data:entry}) }).catch(()=>{});
      }, 500);
    }
  },[sessState, lang, showToast, sheetUrl]);

  const navItems = [
    {id:'home',   ico:'⌂',  es:'Home',      en:'Home'},
    {id:'library',ico:'📚', es:'Ejercicios', en:'Exercises'},
    {id:'programs',ico:'📋',es:'Programas',  en:'Programs'},
    {id:'session',ico:'⚡', es:'Sesión',     en:'Session'},
    {id:'history',ico:'📊', es:'Historial',  en:'History'},
    {id:'settings',ico:'⚙',es:'Ajustes',    en:'Settings'},
  ];

  return (
    <div className="app">
      <div className="hdr">
        <div className="logo">IRON LOG</div>
        <div className="hdr-right">
          <button className="ctrl" onClick={()=>setLang(l=>l==='es'?'en':'es')}>{lang==='es'?'EN':'ES'}</button>
          <button className="ctrl" onClick={()=>setDark(d=>!d)}>{dark?'☀':'☾'}</button>
          <div
            className={`dot${sheetUrl?(syncStatus==='ok'?' on':syncStatus==='syncing'?' syncing':' on'):''}`}
            title={sheetUrl?'Sheets conectado':'Sin Sheets'}
            onClick={()=>sheetUrl&&syncNow()}
            style={{ cursor: sheetUrl?'pointer':'default' }}
          />
        </div>
      </div>
      <div className="content">
        {screen==='home'     && <HomeScreen lang={lang} history={history} onAction={handleHomeAction} />}
        {screen==='library'  && <LibraryScreen lang={lang} sessionActive={sessState.active} onAddToSession={id=>{handleAddToSession(id);setScreen('session');}} />}
        {screen==='programs' && (
          <ProgramsScreen lang={lang} userPrograms={userPrograms} customComplexes={customComplexes}
            onSaveProg={p=>{ setUserPrograms(ps=>[...ps,p]); showToast(lang==='es'?'PROGRAMA GUARDADO':'PROGRAM SAVED'); if(sheetUrl) fetch(sheetUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addProgram',data:p})}).catch(()=>{}); }}
            onDeleteProg={id=>setUserPrograms(ps=>ps.filter(p=>p.id!==id))}
            onSaveCx={cx=>{ setCustomComplexes(cs=>[...cs,cx]); showToast(lang==='es'?'COMPLEJO GUARDADO':'COMPLEX SAVED'); if(sheetUrl) fetch(sheetUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'addComplex',data:cx})}).catch(()=>{}); }}
            onStartProg={p=>handleStartProg(p)}
            onStartCx={cx=>handleStartCx(cx)}
          />
        )}
        {screen==='session'  && (
          <SessionScreen lang={lang} history={history} customComplexes={customComplexes}
            state={sessState} dispatch={a=>{
              if(a.type==='END_SESSION') handleEndSession(a.note);
              else if(a.type==='REGISTER_GETTER') { sessGetterRef.current = a.getter; }
              else sessDispatch(a);
            }}
          />
        )}
        {screen==='history'  && <HistoryScreen lang={lang} history={history} />}
        {screen==='settings' && (
          <SettingsScreen lang={lang} sheetUrl={sheetUrl}
            onSaveUrl={url=>{ setSheetUrl(url); showToast(lang==='es'?'URL GUARDADA':'URL SAVED'); }}
            onSync={syncNow}
            syncStatus={syncStatus}
          />
        )}
      </div>
      <div className="nav">
        {navItems.map(n=>(
          <button key={n.id} className={`nb${screen===n.id?' on':''}`} onClick={()=>setScreen(n.id)}>
            <span className="nb-ico">{n.ico}</span>
            <span>{lang==='es'?n.es:n.en}</span>
          </button>
        ))}
      </div>
      {showEnergy && <EnergyCheck lang={lang} onSelect={onEnergySelect} onSkip={()=>{setShowEnergy(false);if(pendingStart){sessDispatch({type:'START',progName:pendingStart.progName,energy:'good',blocks:pendingStart.blocks||[]});setPendingStart(null);setScreen('session');}}} />}
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
